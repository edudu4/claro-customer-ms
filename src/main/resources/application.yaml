spring:
  application:
    name: claro-customer-ms
  datasource:
    url: jdbc:h2:mem:clarodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  rabbitmq:
    host: ${RABBITMQ_HOST:undefined}
    port: ${RABBITMQ_PORT:0000}
    username: ${RABBITMQ_USERNAME:undefined}
    password: ${RABBITMQ_PASSWORD:undefined}
  security:
    oauth2:
      resource:
        filter-order: 3